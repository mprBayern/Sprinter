<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Podcast</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #e9e9e9;
    padding: 40px;
}

.player {
    background: #dfe2e5;
    padding: 20px;
    border-radius: 12px;
    max-width: 700px;
    display: flex;
    gap: 20px;
    align-items: center;
}

.cover {
    width: 100px;
    height: 100px;
    background: linear-gradient(135deg, #ffd54f, #81d4fa);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
}

.content {
    flex: 1;
}

button {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: none;
    font-size: 20px;
    background: white;
    cursor: pointer;
}

.progress {
    width: 100%;
}

.time {
    font-size: 12px;
    color: #555;
    display: flex;
    justify-content: space-between;
}
</style>
</head>

<body>

<h2>Neuer innovativer Sprinter</h2>

<div class="player">

    <div class="cover">Podcast</div>

    <div class="content">

        <button id="play">▶</button>

        <input type="range" id="progress" class="progress" value="0">

        <div class="time">
            <span id="current">0:00</span>
            <span id="duration">0:00</span>
        </div>

    </div>

</div>

<audio id="audio" src="Sprinter.mp3"></audio>

<script>
const audio = document.getElementById("audio");
const playBtn = document.getElementById("play");
const progress = document.getElementById("progress");
const current = document.getElementById("current");
const duration = document.getElementById("duration");

// Play / Pause
playBtn.onclick = () => {
    if (audio.paused) {
        audio.play();
        playBtn.innerText = "⏸";
    } else {
        audio.pause();
        playBtn.innerText = "▶";
    }
};

// Fortschritt
audio.ontimeupdate = () => {
    progress.value = (audio.currentTime / audio.duration) * 100;
    current.innerText = formatTime(audio.currentTime);
};

// Dauer
audio.onloadedmetadata = () => {
    duration.innerText = formatTime(audio.duration);
};

// Springen
progress.oninput = () => {
    audio.currentTime = (progress.value / 100) * audio.duration;
};

// Zeit formatieren
function formatTime(time) {
    const min = Math.floor(time / 60);
    const sec = Math.floor(time % 60);
    return min + ":" + (sec < 10 ? "0" : "") + sec;
}
</script>

</body>
</html>
