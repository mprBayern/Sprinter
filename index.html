<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Podcast</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f3f4f6;
    padding: 40px;
}

/* Container */
.player {
    background: #e5e7eb;
    border-radius: 12px;
    max-width: 700px;
    padding: 20px;
}

/* Titel */
.title {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 15px;
}

/* Layout links Bild / rechts Player */
.row {
    display: flex;
    gap: 15px;
    align-items: center;
}

/* Cover-Bild */
.cover {
    width: 120px;
    height: 120px;
    border-radius: 10px;
    object-fit: cover;
}

/* Player rechts */
.controls {
    flex: 1;
}

/* Play Button */
button {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: none;
    background: white;
    font-size: 22px;
    cursor: pointer;
    margin-bottom: 10px;
}

/* Fortschrittsbalken */
.progress {
    width: 100%;
}

/* Zeit */
.time {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #555;
}
</style>
</head>

<body>

<div class="player">

    <div class="title">
        Neuer innovativer Sprinter
    </div>

    <div class="row">

        <!-- Bild -->
        <img src="cover.jpg" class="cover">

        <!-- Player -->
        <div class="controls">

            <button id="play">▶</button>

            <input type="range" id="progress" class="progress" value="0">

            <div class="time">
                <span id="current">0:00</span>
                <span id="duration">0:00</span>
            </div>

        </div>

    </div>

</div>

<!-- Audio -->
<audio id="audio" src="Sprinter.mp3"></audio>

<script>
const audio = document.getElementById("audio");
const playBtn = document.getElementById("play");
const progress = document.getElementById("progress");
const current = document.getElementById("current");
const duration = document.getElementById("duration");

// Play / Pause
playBtn.onclick = () => {
    if (audio.paused) {
        audio.play();
        playBtn.innerText = "⏸";
    } else {
        audio.pause();
        playBtn.innerText = "▶";
    }
};

// Fortschritt
audio.ontimeupdate = () => {
    progress.value = (audio.currentTime / audio.duration) * 100;
    current.innerText = formatTime(audio.currentTime);
};

// Dauer
audio.onloadedmetadata = () => {
    duration.innerText = formatTime(audio.duration);
};

// Springen
progress.oninput = () => {
    audio.currentTime = (progress.value / 100) * audio.duration;
};

// Zeit formatieren
function formatTime(time) {
    const min = Math.floor(time / 60);
    const sec = Math.floor(time % 60);
    return min + ":" + (sec < 10 ? "0" : "") + sec;
}
</script>

</body>
</html>
